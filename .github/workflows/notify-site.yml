name: Notify site deploy

# À chaque push de contenu, on prévient le repo du site (motoetm.com)
# pour qu'il relance son déploiement (deploy.yml -> event repository_dispatch).
on:
  push:
    branches: [master]
  workflow_dispatch: {} # déclenchement manuel possible

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Déclencher le déploiement de motoetm.com
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${{ secrets.SITE_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/louakedwayl/motoetm.com/dispatches \
            -d '{"event_type":"content-updated"}'
